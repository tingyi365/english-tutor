<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="AI 英語口說老師 — 語音聽說即時糾正、跟讀、聽寫、情境對話、單字卡、文法填空。純前端、免註冊、免金鑰。" />
  <meta name="theme-color" content="#4f46e5" />
  <title>AI 英語口說老師 · Speak English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <!-- PWA：可安裝到主畫面、離線可用（容易學：回來只要一鍵） -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="英語老師" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- 主題：開畫前先套用已存的偏好，避免淺/深色閃爍（深色為預設） -->
  <script>try{if(localStorage.getItem("theme")==="light")document.documentElement.dataset.theme="light";}catch(e){}</script>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- 頂部列 -->
    <header class="topbar">
      <div class="brand" id="brandHome" role="button" tabindex="0" title="回首頁">
        <span class="brand-logo">🗣️</span>
        <span class="brand-text">AI 英語口說老師</span>
      </div>
      <div class="topbar-right">
        <span id="voiceBadge" class="badge badge-warn" title="語音功能狀態">語音檢測中…</span>
        <button id="themeToggle" class="icon-btn" title="切換深色／淺色（護眼）" aria-label="切換深色或淺色主題">🌙</button>
        <button id="settingsBtn" class="icon-btn" title="設定">⚙️</button>
      </div>
    </header>

    <!-- 主內容容器：各模式渲染於此 -->
    <main id="view" class="view"></main>

    <!-- 底部導覽 -->
    <nav class="tabbar" id="tabbar">
      <button class="tab" data-route="home"><span>🏠</span><i>首頁</i></button>
      <button class="tab" data-route="shadowing"><span>🎤</span><i>跟讀</i></button>
      <button class="tab" data-route="dictation"><span>✍️</span><i>聽寫</i></button>
      <button class="tab" data-route="conversation"><span>💬</span><i>對話</i></button>
      <button class="tab" data-route="flashcard"><span>🃏</span><i>單字</i></button>
      <button class="tab" data-route="grammar"><span>📝</span><i>文法</i></button>
    </nav>
  </div>

  <!-- 設定面板 -->
  <div id="settingsPanel" class="sheet hidden">
    <div class="sheet-card">
      <div class="sheet-head">
        <h3>設定</h3>
        <button class="icon-btn" id="settingsClose">✕</button>
      </div>
      <label class="field">
        <span>示範朗讀語音</span>
        <select id="voiceSelect"></select>
      </label>
      <label class="field">
        <span>朗讀語速：<b id="rateVal">1.0</b>×</span>
        <input type="range" id="rateRange" min="0.5" max="1.3" step="0.05" value="0.95" />
      </label>
      <label class="field">
        <span>每日目標（容易學：先選輕鬆，養成每天打開的習慣）</span>
        <select id="goalSelect">
          <option value="easy">輕鬆 — 每天 5 個練習</option>
          <option value="normal" selected>標準 — 每天 10 個練習</option>
          <option value="serious">認真 — 每天 20 個練習</option>
        </select>
      </label>
      <label class="field">
        <span>辨識嚴格度</span>
        <select id="strictSelect">
          <option value="lenient">寬鬆（初學者友善）</option>
          <option value="normal" selected>標準</option>
          <option value="strict">嚴格</option>
        </select>
      </label>
      <label class="field field-row">
        <span>🔊 達標音效（完成目標／里程碑時播放，可隨時關閉）</span>
        <input type="checkbox" id="soundToggle" checked />
      </label>
      <p class="hint">提示：語音聽寫需使用 <b>Chrome</b> 桌面版或 Android Chrome，並允許麥克風權限。</p>
      <button class="btn btn-ghost btn-block" id="openWall">🏅 成就牆</button>
      <button class="btn btn-ghost btn-block" id="replayOnboarding" style="margin-top:10px">🧭 重看新手導覽</button>
      <button class="btn btn-ghost btn-block" id="resetProgress" style="margin-top:10px">清除學習進度</button>
    </div>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
